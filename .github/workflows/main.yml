name: CI/CD Pipeline to AWS Elastic Beanstalk deploy

on:
  push:
    branches: [ main ]

jobs:
  # --- LAYER 1: STATIC TESTING ---
  lint:
    name: Static Analysis (Pylint)
    runs-on: ubuntu-latest
    # REMOVED: defaults/working-directory (not needed if files are in root)
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint pylint-django

      - name: Run Pylint
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pylint $(find . -name "*.py" -not -path "*/venv/*" -not -path "*/migrations/*") \
          --load-plugins pylint_django \
          --django-settings-module=config.settings \
          --fail-under=5.0

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=aman7csk-cloud_incident-management
            -Dsonar.organization=aman7csk-cloud
            -Dsonar.sources=.
            -Dsonar.python.version=3.11
            -Dsonar.exclusions=**/migrations/**,**/venv/**,**/.c9/**

  # --- LAYER 2: DEPLOYMENT ---
  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: [lint, sonarqube] 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect Static Files
        run: python manage.py collectstatic --noinput

      - name: Generate Deployment Package
        # This creates the zip in the root folder
        run: zip -r deploy.zip . -x "*.git*" "venv/*" ".c9/*" "db.sqlite3"

      - name: Deploy to AWS Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }} 
          application_name: "Incident_management"
          environment_name: "Incidentmanagement-env-1" 
          region: "us-east-1"
          version_label: "app-${{ github.sha }}"
          # FIX: Now it looks for the zip file in the root directory
          deployment_package: "deploy.zip" 
          use_existing_version_if_available: true