{% extends "base.html" %}

{% block content %}

<style>
.error-wrapper{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
}

.error-card{
    background:white;
    padding:50px 60px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.12);
    max-width:520px;
}

.error-code{
    font-size:80px;
    font-weight:800;
    color:#ef4444;
    margin-bottom:10px;
}

.error-title{
    font-size:26px;
    font-weight:700;
    margin-bottom:10px;
    color:#1e293b;
}

.error-msg{
    color:#64748b;
    margin-bottom:30px;
    font-size:15px;
}

.back-btn{
    display:inline-block;
    padding:12px 22px;
    border-radius:10px;
    background:linear-gradient(135deg,#4f46e5,#2563eb);
    color:white;
    text-decoration:none;
    font-weight:600;
    transition:.2s;
}

.back-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(79,70,229,.35);
}
</style>

<div class="error-wrapper">
    <div class="error-card">
        <div class="error-code">403</div>
        <div class="error-title">Access Denied</div>
        <div class="error-msg">
            You are not allowed to perform this action.<br>
            Contact admin if you think this is a mistake.
        </div>

        <a href="{% url 'incidents:incident_list' %}" class="back-btn">
            ← Go Back to Dashboard
        </a>
    </div>
</div>

{% endblock %}
