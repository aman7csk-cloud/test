{% extends "base.html" %}

{% block content %}

<div class="role-card">
    <h2>🛡 Assign Analyst Role</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            {{ form.email.label_tag }}
            {{ form.email }}
        </div>

        <button type="submit" class="btn-assign">
            Assign Analyst
        </button>
    </form>

    {% if messages %}
        {% for message in messages %}
            <div class="alert">{{ message }}</div>
        {% endfor %}
    {% endif %}
</div>

<style>
.role-card{
    max-width:420px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
    text-align:center;
}

.role-card h2{
    margin-bottom:20px;
}

.form-group input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-top:6px;
}

.btn-assign{
    margin-top:15px;
    background:#4f46e5;
    color:white;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
}

.alert{
    margin-top:15px;
    padding:10px;
    border-radius:8px;
    background:#e0f2fe;
}
</style>

{% endblock %}
