{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<div class="page-wrapper">

    <div class="form-card">
        <h2 class="form-title">🚨 Create New Incident</h2>

        <form method="POST">
        {% if form.errors %}
	<div style="background:#ffe6e6;border:1px solid red;padding:10px;margin-bottom:15px;">
   	 <strong>Form Errors:</strong>
   	 {{ form.errors }}
	</div>
	{% endif %}

            {% csrf_token %}

            <div class="form-group">
                {{ form.title.label_tag }}
                {{ form.title }}
            </div>

            <div class="form-group">
                {{ form.description.label_tag }}
                {{ form.description }}
            </div>

            <div class="form-group">
                {{ form.priority.label_tag }}
                {{ form.priority }}
            </div>

            <button type="submit" class="btn-submit">
                Create Incident
            </button>
        </form>

        <a href="{% url 'incidents:incident_list' %}" class="back-link">
            ← View My Incidents
        </a>
    </div>

</div>
