{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="card border-danger">
        <div class="card-header bg-danger text-white">
            <h3>Confirm Deletion</h3>
        </div>
        <div class="card-body">
            <p>Are you sure you want to delete the incident: <strong>{{ incident.title }}</strong>?</p>
            <p class="text-muted">This action cannot be undone.</p>
            
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Yes, Delete Permanently</button>
                <a href="{% url 'incidents:incident_detail' incident.pk %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
