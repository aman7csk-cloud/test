{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

/* PAGE BACKGROUND */
.page-wrapper{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    padding:40px 15px;
}

/* CARD */
.form-card{
    width:100%;
    max-width:650px;
    background:#ffffff;
    padding:35px 40px;
    border-radius:18px;
    box-shadow:0 20px 45px rgba(0,0,0,0.08);
    transition:.25s ease;
}

.form-card:hover{
    transform:translateY(-3px);
    box-shadow:0 28px 60px rgba(0,0,0,0.12);
}

/* TITLE */
.form-title{
    text-align:center;
    margin-bottom:25px;
    font-size:28px;
    font-weight:700;
    color:#1e293b;
}

/* GROUP */
.form-group{
    margin-bottom:18px;
}

/* LABEL */
.form-group label{
    display:block;
    font-weight:600;
    margin-bottom:6px;
    color:#334155;
}

/* DJANGO INPUTS */
.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid #cbd5e1;
    font-size:14px;
    transition:.2s;
    background:#f8fafc;
}

/* FOCUS EFFECT */
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
    outline:none;
    border-color:#4f46e5;
    background:white;
    box-shadow:0 0 0 3px rgba(79,70,229,.15);
}

/* ERROR */
.error-text{
    margin-top:6px;
    color:#ef4444;
    font-size:13px;
    font-weight:500;
}

/* BUTTON */
.btn-submit{
    width:100%;
    margin-top:12px;
    padding:13px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#4f46e5,#2563eb);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

.btn-submit:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(79,70,229,.35);
}

/* BACK LINK */
.back-link{
    display:block;
    text-align:center;
    margin-top:18px;
    text-decoration:none;
    color:#475569;
    font-weight:600;
    transition:.2s;
}

.back-link:hover{
    color:#1e293b;
}

</style>

{% endblock %}


{% block content %}

<div class="page-wrapper">
    <div class="form-card">
        <h2 class="form-title">🚨 Update Incident</h2>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
                <div class="form-group">
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.errors %}
                        <div class="error-text">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn-submit">
                Save Changes
            </button>

            <a href="{% url 'incidents:incident_list' %}" class="back-link">
                ← Back to Incidents
            </a>
        </form>
    </div>
</div>

{% endblock %}
